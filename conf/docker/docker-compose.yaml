x-default-health-check: &default-health-check
  interval: ${HEALTH_CHECK_INTERVAL:-1m}
  timeout: ${HEALTH_CHECK_TIMEOUT:-5s}
  retries: ${HEALTH_CHECK_RETRIES:-3}
  start_period: ${HEALTH_CHECK_START_PERIOD:-60s}

networks:
  mc-infra-connector-network:
  mc-infra-manager-network:
  mc-iam-manager-network:
  mc-cost-optimizer-network:
  mc-application-manager-network:
  mc-workflow-manager-network:
  mc-data-manager-network:
  mc-observability-network:
  mc-web-console-network:

volumes:
  grafana_shared_config:
  shared_logs:

services:
##### MC-INFRA-CONNECTOR #########################################################################################################################

  mc-infra-connector:
    image: cloudbaristaorg/cb-spider:0.12.23
    pull_policy: missing
    container_name: mc-infra-connector
    restart: unless-stopped
    platform: linux/amd64
    networks:
      - mc-infra-connector-network
      - mc-web-console-network
    ports:
      - target: 1024
        published: ${MC_INFRA_CONNECTOR_PORT}
        protocol: tcp
    volumes:
      - ./tool/mcc:/app/tool/mcc
      - ./container-volume/mc-infra-connector/meta_db/:/root/go/src/github.com/cloud-barista/cb-spider/meta_db/
      - ./container-volume/mc-infra-connector/log/:/root/go/src/github.com/cloud-barista/cb-spider/log/
    environment:
      - SERVER_ADDRESS=0.0.0.0:1024
      - SPIDER_USERNAME=${MC_INFRA_CONNECTOR_API_USERNAME:-default}
      - SPIDER_PASSWORD=${MC_INFRA_CONNECTOR_API_PASSWORD:-default}
      - SPIDER_LOG_LEVEL=${MC_INFRA_CONNECTOR_LOG_LEVEL:-error}
      - SPIDER_HISCALL_LOG_LEVEL=${MC_INFRA_CONNECTOR_HISCALL_LOG_LEVEL:-error}
      - ID_TRANSFORM_MODE=OFF
      - PLUGIN_SW=OFF
      - ADMINWEB=OFF
      - SPIDER_BACKUP_ENABLED=false
    healthcheck: # for CB-Spider
      test: [ "CMD", "/app/tool/mcc", "rest", "get", "http://localhost:1024/spider/readyz" ]
      <<: *default-health-check

##### MC-INFRA-MANAGER #########################################################################################################################

  mc-infra-manager:
    image: cloudbaristaorg/cb-tumblebug:0.12.12
    container_name: mc-infra-manager
    restart: unless-stopped
    pull_policy: missing
    platform: linux/amd64
    networks:
      - mc-infra-connector-network
      - mc-infra-manager-network
      - mc-web-console-network
    ports:
      - target: 1323
        published: ${MC_INFRA_MANAGER_PORT}
        protocol: tcp
    depends_on:
      mc-infra-manager-etcd:
        condition: service_started
      mc-infra-connector:
        condition: service_started
      mc-infra-manager-postgres:
        condition: service_healthy
      mc-infra-manager-openbao:
        condition: service_healthy
    volumes:
      - ./tool/mcc:/app/tool/mcc
      - ./conf/mc-infra-manager/conf/:/app/conf/
      - ./conf/mc-infra-manager/assets/:/app/assets/
      - ~/.cloud-barista/credentials.yaml:/root/.cloud-barista/credentials.yaml:ro
      - ./container-volume/mc-infra-manager/meta_db/:/app/meta_db/
      - ./container-volume/mc-infra-manager/log/:/app/log/
    environment:
      # - TB_ROOT_PATH=/app
      - TB_SPIDER_REST_URL=${MC_INFRA_CONNECTOR_REST_URL:-http://mc-infra-connector:1024/spider}
      - TB_ETCD_ENDPOINTS=http://mc-infra-manager-etcd:2379
      - TB_TERRARIUM_REST_URL=http://mc-terrarium:8055/terrarium
      - TB_TERRARIUM_API_USERNAME=${MC_INFRA_MANAGER_TERRARIUM_API_USERNAME:-}
      - TB_TERRARIUM_API_PASSWORD=${MC_INFRA_MANAGER_TERRARIUM_API_PASSWORD:-}
      - TB_IAM_MANAGER_REST_URL=http://mc-iam-manager:${MC_IAM_MANAGER_PORT}
      # - TB_ETCD_AUTH_ENABLED=true
      # - TB_ETCD_USERNAME=default
      # - TB_ETCD_PASSWORD=default
      - TB_POSTGRES_ENDPOINT=mc-infra-manager-postgres:5432
      - TB_POSTGRES_DATABASE=${MC_INFRA_MANAGER_POSTGRES_DB:-tumblebug}
      - TB_POSTGRES_USER=${MC_INFRA_MANAGER_POSTGRES_USER:-tumblebug}
      - TB_POSTGRES_PASSWORD=${MC_INFRA_MANAGER_POSTGRES_PASSWORD:-tumblebug}
      - VAULT_ADDR=http://mc-infra-manager-openbao:${MC_INFRA_MANAGER_OPENBAO_PORT}
      - VAULT_TOKEN=${MC_INFRA_MANAGER_OPENBAO_VAULT_TOKEN:-}
      # - TB_ALLOW_ORIGINS=*
      - TB_AUTH_ENABLED=true
      - TB_AUTH_MODE=basic
      - TB_API_USERNAME=${MC_INFRA_MANAGER_API_USERNAME:-default}
      - TB_API_PASSWORD=${MC_INFRA_MANAGER_API_PASSWORD:-default}
      # - TB_AUTOCONTROL_DURATION_MS=10000
      # - TB_SELF_ENDPOINT=localhost:1323      
      # - TB_DEFAULT_NAMESPACE=ns01
      # - TB_DEFAULT_CREDENTIALHOLDER=admin
      # - TB_LOGFILE_PATH=/app/log/tumblebug.log
      # - TB_LOGFILE_MAXSIZE=10
      # - TB_LOGFILE_MAXBACKUPS=3
      # - TB_LOGFILE_MAXAGE=30
      # - TB_LOGFILE_COMPRESS=false
      # - TB_LOGLEVEL=debug
      # - TB_LOGWRITER=both
      # - TB_NODE_ENV=development
    healthcheck:
      test: [ "CMD", "/app/tool/mcc", "rest", "get", "http://localhost:1323/tumblebug/readyz" ]
      <<: *default-health-check

  mc-infra-manager-etcd:
    image: gcr.io/etcd-development/etcd:v3.6.11
    container_name: mc-infra-manager-etcd
    restart: unless-stopped
    networks:
      - mc-infra-manager-network
    ports:
      - target: 2379
        published: ${MC_INFRA_MANAGER_ETCD_PORT}
        protocol: tcp
      - target: 2380
        published: ${MC_INFRA_MANAGER_ETCD_PEER_PORT}
        protocol: tcp
    volumes:
      - ./container-volume/mc-infra-manager/etcd/data:/etcd-data
    entrypoint: /usr/local/bin/etcd
    command:
      - --name
      - s1
      - --data-dir
      - /etcd-data
      - --listen-client-urls
      - http://0.0.0.0:2379
      - --advertise-client-urls
      - http://0.0.0.0:2379
      - --listen-peer-urls
      - http://0.0.0.0:2380
      - --initial-advertise-peer-urls
      - http://0.0.0.0:2380
      - --initial-cluster
      - s1=http://0.0.0.0:2380
      - --initial-cluster-token
      - tkn
      - --initial-cluster-state
      - new
      - --log-level
      - info
      - --logger
      - zap
      - --log-outputs
      - stderr
      - --auth-token
      - simple
    healthcheck:
      test: [ "CMD", "etcdctl", "endpoint", "health", "--endpoints=http://localhost:2379"]
      <<: *default-health-check


  mc-infra-manager-openbao:
    image: openbao/openbao:2.5.1
    container_name: mc-infra-manager-openbao
    restart: unless-stopped
    networks:
      - mc-infra-manager-network
    ports:
      - target: ${MC_INFRA_MANAGER_OPENBAO_PORT}
        published: ${MC_INFRA_MANAGER_OPENBAO_PORT}
        protocol: tcp
    cap_add:
      - IPC_LOCK
    environment:
      - BAO_ADDR=http://127.0.0.1:${MC_INFRA_MANAGER_OPENBAO_PORT}
      - BAO_PORT=${MC_INFRA_MANAGER_OPENBAO_PORT}
      - SKIP_SETCAP=true
      - MC_INFRA_MANAGER_OPENBAO_VAULT_TOKEN=${MC_INFRA_MANAGER_OPENBAO_VAULT_TOKEN:-dev-only-token}
    volumes:
      - ./conf/mc-infra-manager/openbao-config.hcl:/openbao/config/config.hcl:ro
      - ./conf/mc-infra-manager/openbao-entrypoint.sh:/openbao/entrypoint.sh:ro
      - ./container-volume/openbao-data:/openbao/data
    entrypoint: ["/bin/sh", "/openbao/entrypoint.sh"]
    healthcheck:
      test: ["CMD", "bao", "status"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s

  # mc-infra-manager PostgreSQL
  # This is used for storing CB-Tumblebug Spec and Image.
  mc-infra-manager-postgres:
    image: postgres:16-alpine
    container_name: mc-infra-manager-postgres
    restart: always
    networks:
      - mc-infra-manager-network
      # # Enable external network for outbound access (not ideal for security)
      # - external_network
    ports:
      - ${MC_INFRA_MANAGER_POSTGRES_HOST_PORT}:5432
    volumes:
      - ./container-volume/mc-infra-manager/meta_db/postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${MC_INFRA_MANAGER_POSTGRES_USER:-tumblebug}
      - POSTGRES_PASSWORD=${MC_INFRA_MANAGER_POSTGRES_PASSWORD:-tumblebug}
      - POSTGRES_DB=${MC_INFRA_MANAGER_POSTGRES_DB:-tumblebug}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MC_INFRA_MANAGER_POSTGRES_USER:-tumblebug}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # CB-MapUI is a Web-based test client (disable it for production use)
  cb-mapui:
    image: cloudbaristaorg/cb-mapui:0.12.34
    container_name: cb-mapui
    networks:
      - mc-infra-manager-network
    ports:
      - target: 1324
        published: 1324
        protocol: tcp
    restart: unless-stopped


##### MC-IAM-MANAGER #########################################################################################################################

  mc-iam-manager:
    container_name: mc-iam-manager
    image: cloudbaristaorg/mc-iam-manager:0.5.3
    restart: unless-stopped
    networks:
      - mc-iam-manager-network
      - mc-infra-manager-network
      - mc-web-console-network
    ports:
      - target: ${MC_IAM_MANAGER_PORT}
        published: ${MC_IAM_MANAGER_PORT}
        protocol: tcp
    depends_on:
      mc-iam-manager-db:
        condition: service_healthy
      mc-iam-manager-kc:
        condition: service_healthy
      mc-iam-manager-nginx:
        condition: service_started
      mc-infra-manager:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${MC_IAM_MANAGER_DATABASE_USER}:${MC_IAM_MANAGER_DATABASE_PASSWORD}@${MC_IAM_MANAGER_DATABASE_HOST}:5432/${MC_IAM_MANAGER_DATABASE_NAME}
      PORT: ${MC_IAM_MANAGER_PORT}
    env_file:
      - ./conf/mc-iam-manager/.env
    volumes:
      - ./tool/mcc:/app/tool/mcc
    healthcheck:
      test: [ "CMD", "/app/tool/mcc", "rest", "get", "http://${MC_IAM_MANAGER_DOMAIN}:${MC_IAM_MANAGER_PORT}/readyz" ]
      <<: *default-health-check

  mc-iam-manager-db:
    container_name: mc-iam-manager-db
    image: postgres:14-alpine
    pull_policy: missing
    platform: linux/amd64
    restart: unless-stopped
    networks:
      - mc-iam-manager-network
    ports:
      - target: 5432
        published: ${MC_IAM_MANAGER_DB_HOST_PORT}
        protocol: tcp
    volumes:
      - ./container-volume/mc-iam-manager/postgres/postgres_data:/var/lib/postgresql/data
      - ./conf/mc-iam-manager/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    environment:
      POSTGRES_DB: ${MC_IAM_MANAGER_DATABASE_NAME}
      POSTGRES_USER: ${MC_IAM_MANAGER_DATABASE_USER}
      POSTGRES_PASSWORD: ${MC_IAM_MANAGER_DATABASE_PASSWORD}
    env_file:
      - ./conf/mc-iam-manager/.env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${MC_IAM_MANAGER_DATABASE_USER} -d ${MC_IAM_MANAGER_DATABASE_NAME}" ]
      <<: *default-health-check
    command: >
      sh -c "chown -R 70:70 /var/lib/postgresql/data &&
            exec docker-entrypoint.sh postgres"

  mc-iam-manager-kc:
    container_name: mc-iam-manager-kc
    image: quay.io/keycloak/keycloak:24.0.1
    restart: unless-stopped
    networks:
      - mc-iam-manager-network
    ports:
      - target: 8080
        published: ${MC_IAM_MANAGER_KEYCLOAK_PORT}
        protocol: tcp
    command:
      - start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://mc-iam-manager-db:5432/${MC_IAM_MANAGER_KEYCLOAK_DATABASE_NAME}
      KC_DB_USERNAME: ${MC_IAM_MANAGER_DATABASE_USER}
      KC_DB_PASSWORD: ${MC_IAM_MANAGER_DATABASE_PASSWORD}
      KC_HOSTNAME_STRICT: false
      KC_HOSTNAME_STRICT_HTTPS: false
      KC_HOSTNAME_URL: ${MC_IAM_MANAGER_PUBLIC_HOST}/auth
      KC_HTTP_RELATIVE_PATH: /auth
      KEYCLOAK_ADMIN: ${MC_IAM_MANAGER_KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${MC_IAM_MANAGER_KEYCLOAK_ADMIN_PASSWORD:-admin_password}
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_PROXY: edge
      KC_FEATURES: token-exchange,admin-fine-grained-authz
    volumes:
      - ./tool/mcc:/app/tool/mcc
      - ./container-volume/mc-iam-manager/keycloak/data/:/opt/keycloak/data/
    env_file:
      - ./conf/mc-iam-manager/.env
    depends_on:
      - mc-iam-manager-db
    healthcheck:
      test: [ "CMD", "/app/tool/mcc", "rest", "get", "http://localhost:8080/auth/" ]
      # test: [ "CMD", "/app/tool/mcc", "rest", "get", "http://localhost:8080/health/ready" ]
      <<: *default-health-check

  mc-iam-manager-nginx:
    image: nginx:1.25-alpine
    container_name: mc-iam-manager-nginx
    restart: unless-stopped
    ports:
      - "${MC_IAM_MANAGER_NGINX_HTTP_PORT}:80"
      - "${MC_IAM_MANAGER_NGINX_HTTPS_PORT}:443"
      - "${MC_WEB_CONSOLE_FRONT_PORT}:${MC_WEB_CONSOLE_FRONT_PORT}"
      - "${MC_OBSERVABILITY_GRAFANA_PROXY_PORT}:${MC_OBSERVABILITY_GRAFANA_PROXY_PORT}"
      - "${MC_COST_OPTIMIZER_FE_PROXY_PORT}:${MC_COST_OPTIMIZER_FE_PROXY_PORT}"
      - "${MC_COST_OPTIMIZER_BE_PORT}:${MC_COST_OPTIMIZER_BE_PORT}"
      - "${MC_COST_OPTIMIZER_ALARM_PORT}:${MC_COST_OPTIMIZER_ALARM_PORT}"
      - "${MC_WORKFLOW_MANAGER_PROXY_PORT}:${MC_WORKFLOW_MANAGER_PROXY_PORT}"
      - "${MC_DATA_MANAGER_PROXY_PORT}:${MC_DATA_MANAGER_PROXY_PORT}"
      - "${MC_APPLICATION_MANAGER_PROXY_PORT}:${MC_APPLICATION_MANAGER_PROXY_PORT}"
    environment:
      - DOMAIN_NAME=${MC_IAM_MANAGER_PUBLIC_DOMAIN}
    volumes:
      - ./container-volume/mc-iam-manager/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./container-volume/mc-iam-manager/certs:/etc/nginx/certs:ro
      - ./container-volume/certbot/www:/var/www/certbot:ro
    depends_on:
      - mc-iam-manager-kc
    networks:
      - mc-iam-manager-network
      - mc-observability-network
      - mc-cost-optimizer-network
      - mc-workflow-manager-network
      - mc-data-manager-network

  mc-iam-manager-post-initial:
    image: ubuntu:22.04
    container_name: mc-iam-manager-post-initial
    # restart: unless-stopped
    networks:
      - mc-iam-manager-network
      - mc-infra-manager-network
    depends_on:
      mc-iam-manager:
        condition: service_started
      mc-iam-manager-db:
        condition: service_healthy
      mc-iam-manager-kc:
        condition: service_healthy
    env_file:
      - ./conf/mc-iam-manager/.env
    volumes:
      - ./tool/mcc:/app/tool/mcc
      - ./conf/mc-iam-manager/:/app/mc-iam-manager/
      - ./api.yaml:/app/mc-iam-manager/api.yaml
    working_dir: /app/mc-iam-manager
    command: bash /app/mc-iam-manager/docker-post-init.sh


##### MC-COST-OPTIMIZER #########################################################################################################################

  mc-cost-optimizer-fe:
    restart: unless-stopped
    container_name: mc-cost-optimizer-fe
    image: cloudbaristaorg/mc-costopti-ui:0.5.2
    networks:
      - mc-cost-optimizer-network
      - mc-observability-network
      - mc-infra-manager-network
      - mc-web-console-network
    ports:
      - target: 80
        published: ${MC_COST_OPTIMIZER_FE_PORT}
        protocol: tcp
    depends_on:
      - mc-cost-optimizer-be
    volumes:
      - ./tool/mcc:/app/tool/mcc
    healthcheck:
      test: [ "CMD", "/app/tool/mcc", "rest", "get", "http://localhost:80" ]
      <<: *default-health-check

  mc-cost-optimizer-be:
    restart: on-failure
    container_name: mc-cost-optimizer-be
    image: cloudbaristaorg/mc-costopti-api:0.5.2
    networks:
      - mc-cost-optimizer-network
      - mc-observability-network
      - mc-infra-manager-network
      - mc-web-console-network
    depends_on:
      - mc-cost-optimizer-db
    volumes:
      - ./tool/mcc:/app/tool/mcc
    environment:
      spring.datasource.hikari.cost.optimize.jdbc-url: ${MC_COST_OPTIMIZER_COST_DB_URL_NEW}
      spring.datasource.hikari.cost.optimize.username: ${MC_COST_OPTIMIZER_MYSQL_USER}
      spring.datasource.hikari.cost.optimize.password: ${MC_COST_OPTIMIZER_MYSQL_PASSWORD}
      tumblebug.url: http://mc-infra-manager:1323/tumblebug
      tumblebug.username: ${MC_COST_OPTIMIZER_TUMBLEBUG_USERNAME:-spider}
      tumblebug.password: ${MC_COST_OPTIMIZER_TUMBLEBUG_PASSWORD:-spider}
      costopti.alarmservice.url: ${MC_COST_OPTIMIZER_ALARM_URL}
      costopti.assetcollector.url: ${MC_COST_OPTIMIZER_COST_ASSET_COLLECTOR_URL}
      costopti.costcollector.url: ${MC_COST_OPTIMIZER_COST_COLLECTOR_URL}
      costopti.costprocessor.url: ${MC_COST_OPTIMIZER_COST_PROCESSOR_URL}
      costopti.costselector.url: ${MC_COST_OPTIMIZER_COST_SELECTOR_URL}
    healthcheck:
      test: [ "CMD", "/app/tool/mcc", "rest", "get",  "http://localhost:9090/api/costopti/be/readyz" ]
      <<: *default-health-check

  mc-cost-optimizer-cost-collector:
    restart: on-failure
    container_name: mc-cost-optimizer-cost-collector
    image: cloudbaristaorg/mc-costopti-costcollector:0.5.2
    networks:
      - mc-cost-optimizer-network
      - mc-observability-network
      - mc-infra-manager-network
      - mc-web-console-network
    ports:
      - target: 8081
        published: ${MC_COST_OPTIMIZER_COLLECTOR_PORT}
        protocol: tcp
    depends_on:
      - mc-cost-optimizer-db
    volumes:
      - ./tool/mcc:/app/tool/mcc
    environment:
      spring.datasource.hikari.batch.jdbc-url: ${MC_COST_OPTIMIZER_COST_DB_URL}
      spring.datasource.hikari.batch.username: ${MC_COST_OPTIMIZER_MYSQL_USER}
      spring.datasource.hikari.batch.password: ${MC_COST_OPTIMIZER_MYSQL_PASSWORD}
      unusedBatchCronSchedule: ${MC_COST_OPTIMIZER_COST_COLLECT_UNUSED_CRON_SCHEDULE}
      curBatchCronSchedule: ${MC_COST_OPTIMIZER_COST_COLLECT_CUR_CRON_SCHEDULE}
      aws.data.export.name: ${MC_COST_OPTIMIZER_AWS_CUR_EXPORT_NAME}
      aws.data.export.path.prefix: ${MC_COST_OPTIMIZER_AWS_CUR_EXPORT_PATH_PREFIX}
      AWS_ACCESS_KEY_ID: ${MC_COST_OPTIMIZER_AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${MC_COST_OPTIMIZER_AWS_SECRET_ACCESS_KEY}

  mc-cost-optimizer-cost-processor:
    restart: on-failure
    container_name: mc-cost-optimizer-cost-processor
    image: cloudbaristaorg/mc-costopti-costprocessor:0.5.2
    networks:
      - mc-cost-optimizer-network
      - mc-observability-network
      - mc-infra-manager-network
      - mc-web-console-network
    ports:
      - target: 8082
        published: ${MC_COST_OPTIMIZER_PROCESSOR_PORT}
        protocol: tcp
    depends_on:
      - mc-cost-optimizer-db
    volumes:
      - ./tool/mcc:/app/tool/mcc
    environment:
      spring.datasource.hikari.batch.jdbc-url: ${MC_COST_OPTIMIZER_COST_DB_URL}
      spring.datasource.hikari.batch.username: ${MC_COST_OPTIMIZER_MYSQL_USER}
      spring.datasource.hikari.batch.password: ${MC_COST_OPTIMIZER_MYSQL_PASSWORD}
      unusedProcessCronSchedule: ${MC_COST_OPTIMIZER_COST_PROCESS_UNUSED_CRON_SCHEDULE}
      abnormalProcessCronSchedule: ${MC_COST_OPTIMIZER_COST_PROCESS_ABNORMAL_CRON_SCHEDULE}
      cost.selector.url: ${MC_COST_OPTIMIZER_COST_SELECTOR_URL}
      opti.alarm.url: ${MC_COST_OPTIMIZER_ALARM_URL}

  mc-cost-optimizer-cost-selector:
    restart: on-failure
    container_name: mc-cost-optimizer-cost-selector
    image: cloudbaristaorg/mc-costopti-costselector:0.5.2
    networks:
      - mc-cost-optimizer-network
      - mc-observability-network
      - mc-infra-manager-network
      - mc-web-console-network
    ports:
      - target: 8083
        published: ${MC_COST_OPTIMIZER_SELECTOR_PORT}
        protocol: tcp
    depends_on:
      - mc-cost-optimizer-db
    volumes:
      - ./tool/mcc:/app/tool/mcc
    environment:
      spring.datasource.hikari.cost.optimize.jdbc-url: ${MC_COST_OPTIMIZER_COST_DB_URL}
      spring.datasource.hikari.cost.optimize.username: ${MC_COST_OPTIMIZER_MYSQL_USER}
      spring.datasource.hikari.cost.optimize.password: ${MC_COST_OPTIMIZER_MYSQL_PASSWORD}
      opti.alarm.url: ${MC_COST_OPTIMIZER_ALARM_URL}

  mc-cost-optimizer-alarm-service:
    restart: on-failure
    container_name: mc-cost-optimizer-alarm-service
    image: cloudbaristaorg/mc-costopti-alarm:0.5.2
    networks:
      - mc-cost-optimizer-network
      - mc-observability-network
      - mc-infra-manager-network
      - mc-web-console-network
    depends_on:
      - mc-cost-optimizer-db
    volumes:
      - ./tool/mcc:/app/tool/mcc
    environment:
      spring.datasource.hikari.slack.jdbc-url: ${MC_COST_OPTIMIZER_SLACK_DB_URL}
      spring.datasource.hikari.slack.username: ${MC_COST_OPTIMIZER_MYSQL_USER}
      spring.datasource.hikari.slack.password: ${MC_COST_OPTIMIZER_MYSQL_PASSWORD}
      spring.datasource.hikari.mailing.jdbc-url: ${MC_COST_OPTIMIZER_MAIL_DB_URL}
      spring.datasource.hikari.mailing.username: ${MC_COST_OPTIMIZER_MYSQL_USER}
