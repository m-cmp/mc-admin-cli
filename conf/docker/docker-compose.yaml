      - mc-cost-optimizer-network
      - mc-web-console-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      <<: *default-health-check

##### MC-APPLICATION-MANAGER #########################################################################################################################

  mc-application-manager-db:
    image: postgres:16-alpine
    container_name: mc-application-manager-db
    restart: always
    networks:
      - mc-application-manager-network
    ports:
      - target: 5432
        published: ${MC_APPLICATION_MANAGER_DB_HOST_PORT}
        protocol: tcp
    volumes:
      - ./container-volume/mc-application-manager/am_db/data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=${MC_APPLICATION_MANAGER_POSTGRES_USER:-application}
      - POSTGRES_PASSWORD=${MC_APPLICATION_MANAGER_POSTGRES_PASSWORD:-application!23}
      - POSTGRES_DB=${MC_APPLICATION_MANAGER_POSTGRES_DB:-appmgr}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MC_APPLICATION_MANAGER_POSTGRES_USER:-application} -d ${MC_APPLICATION_MANAGER_POSTGRES_DB:-appmgr}"]
      <<: *default-health-check
    command: >
      sh -c "chown -R postgres:postgres /var/lib/postgresql/data &&
            exec docker-entrypoint.sh postgres"

  mc-application-manager-sonatype-nexus:
    image: sonatype/nexus3:latest
    container_name: mc-application-manager-sonatype-nexus
    platform: linux/amd64
    networks:
      - mc-application-manager-network
      - mc-web-console-network
    ports:
      - target: 8081
        published: ${MC_APPLICATION_MANAGER_NEXUS_PORT}
        protocol: tcp
      - target: 5000
        published: ${MC_APPLICATION_MANAGER_NEXUS_DOCKER_PORT}
        protocol: tcp
    volumes:
      - ./container-volume/mc-application-manager/nexus/:/nexus-data:rw
    environment:
      NEXUS_SECURITY_RANDOMPASSWORD: 'false'
      NEXUS_SECURITY_INITIAL_PASSWORD: ${MC_APPLICATION_MANAGER_NEXUS_INITIAL_PASSWORD:-123456}
    user: root
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      <<: *default-health-check

  mc-application-manager:
    image: cloudbaristaorg/mc-application-manager:0.5.2
    container_name: mc-application-manager
    depends_on:
      mc-application-manager-db:
        condition: service_healthy
    networks:
      - mc-application-manager-network
      - mc-web-console-network
      - mc-observability-network
    ports:
      - target: 18084
        published: ${MC_APPLICATION_MANAGER_PORT}
        protocol: tcp
    volumes:
      - ./tool/mcc:/app/tool/mcc
      - ./container-volume/mc-application-manager/nexus/:/nexus-data:rw
    user: root
    environment:
      - DDL_AUTO=update
      - DB_URL=jdbc:postgresql://mc-application-manager-db:5432/${MC_APPLICATION_MANAGER_POSTGRES_DB:-appmgr}
      - DB_USER=${MC_APPLICATION_MANAGER_POSTGRES_USER:-application}
      - DB_PASS=${MC_APPLICATION_MANAGER_POSTGRES_PASSWORD:-application!23}
      - SQL_DATA_INIT=never
      - TUMBLEBUG_URL=mc-infra-manager
      - TUMBLEBUG_PORT=1323
      - TUMBLEBUG_ID=${MC_INFRA_MANAGER_API_USERNAME:-default}
      - TUMBLEBUG_PASSWORD=${MC_INFRA_MANAGER_API_PASSWORD:-default}
      - SPIDER_URL=${MC_INFRA_CONNECTOR_URL:-mc-infra-connector}
#      - ALERT_SLACK_CHANNEL_ID= # I You need Slack Alram. Please CHANGE ME.
      - RABBITMQ_URL=mc-observability-rabbitmq
    healthcheck:
      test: [ "CMD", "/app/tool/mcc", "rest", "get", "http://localhost:18084/readyz" ]
      <<: *default-health-check


##### MC-WORKFLOW-MANAGER #########################################################################################################################

  mc-workflow-manager-jenkins:
    image: jenkins/jenkins:2.504.1-lts-jdk17
    container_name: mc-workflow-manager-jenkins
    platform: linux/amd64
    networks:
      - mc-workflow-manager-network
      - mc-web-console-network
      - mc-infra-manager-network
    ports:
      - target: 8080
        published: ${MC_WORKFLOW_MANAGER_JENKINS_PORT}
        protocol: tcp
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/bin/docker:/usr/bin/docker
      - ./container-volume/mc-workflow-manager/jenkins/:/var/jenkins_home:rw
      - ./tool/init.groovy.d:/usr/share/jenkins/ref/init.groovy.d
    environment:
      JENKINS_USERNAME: ${MC_WORKFLOW_MANAGER_JENKINS_USERNAME:-admin}
      JENKINS_PASSWORD: ${MC_WORKFLOW_MANAGER_JENKINS_PASSWORD:-123456}
      JAVA_OPTS: -Djenkins.install.runSetupWizard=false
    user: root
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      <<: *default-health-check


  mc-workflow-manager:
    image: cloudbaristaorg/mc-workflow-manager:0.5.2
    container_name: mc-workflow-manager
    platform: linux/amd64
    networks:
      - mc-workflow-manager-network
      - mc-web-console-network
    ports:
      - target: 18083
        published: ${MC_WORKFLOW_MANAGER_PORT}
        protocol: tcp
    volumes:
      - ./tool/mcc:/app/tool/mcc
      - ./conf/mc-workflow-manager/document/:/document/
    environment:
      - DB_INIT_YN=update
      - DB_ID=${MC_WORKFLOW_MANAGER_DB_ID:-workflow}
      - DB_PW=${MC_WORKFLOW_MANAGER_DB_PW:-workflow!23}
      - SQL_DATA_INIT=never
    healthcheck:
      test: [ "CMD", "/app/tool/mcc", "rest", "get", "http://localhost:18083/readyz" ]
      <<: *default-health-check


##### MC-DATA-MANAGER #########################################################################################################################

  mc-data-manager-init-volumes:
    image: busybox:stable
    container_name: mc-data-manager-init-volumes
    command: ["sh", "-c", "chown -R ${UID:-0}:${GID:-0} /app/data"]
    volumes:
      - ./conf/mc-data-manager/data:/app/data/
    user: root
    env_file:
      - ./conf/mc-data-manager/.env
    init: true
    networks:
      - mc-data-manager-network

  mc-data-manager:
    image: cloudbaristaorg/mc-data-manager:0.5.5
    container_name: mc-data-manager
    depends_on:
      mc-data-manager-init-volumes:
        condition: service_completed_successfully
      mc-data-manager-db:
        condition: service_healthy
    tty: true
    ports:
      - "${MC_DATA_MANAGER_PORT}:3300"
    restart : always
    volumes:
      - ./data:/app/data/ # container-volume
      - ./scripts:/app/scripts/ # container-volume
      - /etc/localtime:/etc/localtime:ro # timezone
    environment:
      - TUMBLEBUG_URL=http://mc-infra-manager:1323
      - VAULT_ADDR=http://mc-infra-manager-openbao:${MC_INFRA_MANAGER_OPENBAO_PORT}
      - VAULT_TOKEN=${MC_INFRA_MANAGER_OPENBAO_VAULT_TOKEN:-}
    env_file:
      - ./conf/mc-data-manager/.env
    # Health check configuration
    # OK [ 2xx ,3xx}, ERR [4xx,5xx,...etc]
    networks:
      - mc-data-manager-network
      - mc-web-console-network
      - mc-infra-manager-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3300/readyZ"]
      interval: 30s
      timeout: 10s
      retries: 3
      <<: *default-health-check

  mc-data-manager-db:
    image: mariadb:latest
    container_name: mc-data-manager-db
    command:
      - --skip-character-set-client-handshake
    volumes:
      - ./container-volume/mc-data-manager/mariadb:/var/lib/mysql
    ports:
      - target: 3306
        published: ${MC_DATA_MANAGER_DB_HOST_PORT}
        protocol: tcp
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--su-mysql", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 10s
      retries: 3
      <<: *default-health-check
    networks:
      - mc-data-manager-network
    environment:
      - MYSQL_DATABASE=${MC_DATA_MANAGER_MYSQL_DATABASE:-mcmp}
      - MYSQL_USER=${MC_DATA_MANAGER_MYSQL_USER:-mcmp}
      - MYSQL_PASSWORD=${MC_DATA_MANAGER_MYSQL_PASSWORD:-mcmp}
      - MYSQL_ROOT_PASSWORD=${MC_DATA_MANAGER_MYSQL_ROOT_PASSWORD:-mcmp}


##### MC-WEB-CONSOLE #########################################################################################################################


  mc-web-console-db:
    image: postgres:14-alpine
    container_name: mc-web-console-db
    restart: unless-stopped
    volumes:
      - ./container-volume/mc-web-console/postgres/postgres_data:/var/lib/postgresql/data
      - ./conf/mc-web-console/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    environment:
      POSTGRES_DB: ${MC_WEB_CONSOLE_POSTGRES_DB}
      POSTGRES_USER: ${MC_WEB_CONSOLE_POSTGRES_USER}
      POSTGRES_PASSWORD: ${MC_WEB_CONSOLE_POSTGRES_PASSWORD}
    networks:
      - mc-web-console-network
    pull_policy: missing
    platform: linux/amd64
    ports:
      - target: 5432
        published: ${MC_WEB_CONSOLE_DB_HOST_PORT}
        protocol: tcp
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${MC_WEB_CONSOLE_POSTGRES_USER} -d ${MC_WEB_CONSOLE_POSTGRES_DB}" ]
      <<: *default-health-check
    command: >
      sh -c "chown -R 70:70 /var/lib/postgresql/data &&
            exec docker-entrypoint.sh postgres"

  mc-web-console-api:
    image: csescsta/mc-web-console-api:edge
    pull_policy: never
    container_name: mc-web-console-api
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      - mc-web-console-db
      - mc-infra-connector
      - mc-infra-manager
      - mc-iam-manager
    ports:
      - target: 3000
        published: ${MC_WEB_CONSOLE_API_PORT}
        protocol: tcp
    networks:
      - mc-web-console-network
      - mc-iam-manager-network
    environment:
      MC_WEB_CONSOLE_GO_ENV: ${MC_WEB_CONSOLE_GO_ENV}
      GODEBUG: netdns=go
      MC_WEB_CONSOLE_API_ADDR: ${MC_WEB_CONSOLE_API_ADDR}
      MC_WEB_CONSOLE_API_PORT: "3000"
      MC_WEB_CONSOLE_POSTGRES_HOST: ${MC_WEB_CONSOLE_POSTGRES_HOST}
      MC_WEB_CONSOLE_POSTGRES_PORT: ${MC_WEB_CONSOLE_POSTGRES_PORT}
      MC_WEB_CONSOLE_POSTGRES_USER: ${MC_WEB_CONSOLE_POSTGRES_USER}
      MC_WEB_CONSOLE_POSTGRES_PASSWORD: ${MC_WEB_CONSOLE_POSTGRES_PASSWORD}
      MC_WEB_CONSOLE_POSTGRES_DB: ${MC_WEB_CONSOLE_POSTGRES_DB}
      MC_WEB_CONSOLE_POSTGRES_SSLMODE: ${MC_WEB_CONSOLE_POSTGRES_SSLMODE}
      MC_WEB_CONSOLE_USE_IAM: ${MC_WEB_CONSOLE_USE_IAM}
      MC_WEB_CONSOLE_USE_TICKET_VALID: ${MC_WEB_CONSOLE_USE_TICKET_VALID}
      MC_WEB_CONSOLE_IFRAME_TARGET_IS_HOST: ${MC_WEB_CONSOLE_IFRAME_TARGET_IS_HOST}
      MC_WEB_CONSOLE_JWT_SECRET: ${MC_WEB_CONSOLE_JWT_SECRET}
      MC_WEB_CONSOLE_MENUYAML: ${MC_WEB_CONSOLE_MENUYAML}
      MC_ADMIN_CLI_APIYAML: ${MC_ADMIN_CLI_APIYAML}
      MC_IAM_MANAGER_HOST: mc-iam-manager
      MC_IAM_MANAGER_PORT: ${MC_IAM_MANAGER_PORT}
    volumes:
      - ./tool/mcc:/app/tool/mcc
      - ./conf/mc-web-console/api/conf/:/conf/
    healthcheck:
      test: [ "CMD", "/app/tool/mcc", "rest", "get", "http://localhost:3000/readyz" ]
      <<: *default-health-check

  mc-web-console-front:
    image: csescsta/mc-web-console-front:edge
    pull_policy: always
    container_name: mc-web-console-front
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      - mc-web-console-api
    networks:
      - mc-web-console-network
      - mc-iam-manager-network
    environment:
      MC_WEB_CONSOLE_API_ADDR: mc-web-console-api
      MC_WEB_CONSOLE_API_PORT: "3000"
      MC_WEB_CONSOLE_FRONT_ADDR: ${MC_WEB_CONSOLE_FRONT_ADDR}
      MC_WEB_CONSOLE_FRONT_PORT: "3001"
      MC_WEB_CONSOLE_SESSION_SECRET: ${MC_WEB_CONSOLE_SESSION_SECRET}
    volumes:
      - ./tool/mcc:/app/tool/mcc
    healthcheck:
      test: [ "CMD", "/app/tool/mcc", "rest", "get", "http://localhost:3001" ]
      <<: *default-health-check
##### MC-OBSERVABILITY #########################################################################################################################
  mc-observability-manager:
    image: cloudbaristaorg/mc-observability:edge
    container_name: mc-observability-manager
    restart: on-failure
    networks:
      - mc-observability-network
      - mc-cost-optimizer-network
      - mc-infra-manager-network
      - mc-infra-connector-network
      - mc-web-console-network
    ports:
      - target: 18080
        published: ${MC_OBSERVABILITY_MANAGER_PORT}
        protocol: tcp
    depends_on:
      mc-observability-grafana:
        condition: service_healthy
      mc-observability-infra:
        condition: service_healthy
      mc-observability-influx:
        condition: service_healthy
      mc-observability-influx-2:
        condition: service_healthy
      mc-observability-loki:
        condition: service_healthy
      mc-observability-maria:
        condition: service_healthy
      mc-observability-rabbitmq:
        condition: service_healthy
      mc-observability-tempo:
        condition: service_healthy
    env_file:
      - ./conf/mc-observability/manager/.env
    volumes:
      - ./tool/mcc:/app/tool/mcc
      - shared_logs:/applog/mc-o11y-manager:rw
      - grafana_shared_config:/grafana_config:ro
    healthcheck:
      test: [ "CMD", "/app/tool/mcc", "rest", "get", "http://localhost:18080/api/docs" ]
      <<: *default-health-check

  mc-observability-front:
    image: cloudbaristaorg/mc-observability-front:edge
    container_name: mc-observability-front
    restart: on-failure
    networks:
      - mc-observability-network
      - mc-infra-manager-network
      - mc-infra-connector-network
    ports:
      - target: 18081
        published: ${MC_OBSERVABILITY_FRONT_PORT}
        protocol: tcp
    depends_on:
      mc-observability-manager:
        condition: service_healthy

  mc-observability-infra:
    image: cloudbaristaorg/mc-observability-infra:edge
    container_name: mc-observability-infra
    restart: on-failure
    networks:
      - mc-observability-network
    ports:
      - target: 3000
        published: ${MC_OBSERVABILITY_INFRA_PORT}
        protocol: tcp
    depends_on:
      mc-observability-maria:
        condition: service_healthy
    env_file:
      - ./conf/mc-observability/mc-observability-infra/.env
    volumes:
      - ./conf/mc-observability/mc-observability-infra/ansible:/ansible
    healthcheck:
      start_period: 120s
      test: 'curl -s http://127.0.0.1:3000/api/ping ; STATUS=`echo $$?` ; if [ $$STATUS != 0 ] && [ $$STATUS != 52 ]; then exit 1 ; fi'
      interval: 10s
      timeout: 10s
      retries: 30

  mc-observability-rabbitmq-init-volumes:
    image: busybox:stable
    container_name: mc-observability-rabbitmq-init-volumes
    restart: "no"
    networks:
      - mc-observability-network
    command:
      - sh
      - -c
      - |
        set -eux && \
        mkdir -p /var/lib/rabbitmq /var/log/rabbitmq && \
        if [ ! -s /var/lib/rabbitmq/.erlang.cookie ] || \
           [ "$$(wc -c < /var/lib/rabbitmq/.erlang.cookie)" -lt 20 ]; then
          umask 177
          tr -dc 'A-Za-z0-9' </dev/urandom | head -c 48 > /var/lib/rabbitmq/.erlang.cookie
        fi && \
        chmod 600 /var/lib/rabbitmq/.erlang.cookie && \
        chown -R 132:141 /var/lib/rabbitmq /var/log/rabbitmq
    volumes:
      - ./container-volume/mc-observability/rabbitmq/data:/var/lib/rabbitmq
    user: root
    init: true

  mc-observability-rabbitmq:
    image: rabbitmq:4.1.4-management-alpine
    container_name: mc-observability-rabbitmq
    restart: on-failure
    networks:
      - mc-observability-network
    ports:
      - target: 5672
        published: ${MC_OBSERVABILITY_RABBITMQ_AMQP_PORT}
        protocol: tcp
      - target: 1883
        published: ${MC_OBSERVABILITY_RABBITMQ_MQTT_PORT}
        protocol: tcp
      - target: 15672
        published: ${MC_OBSERVABILITY_RABBITMQ_MGMT_PORT}
        protocol: tcp
      # - target: 8883
      #   published: 8883
      #   protocol: tcp
      # - target: 15675
      #   published: 15675
      #   protocol: tcp
    depends_on:
      mc-observability-rabbitmq-init-volumes:
        condition: service_completed_successfully
    environment:
      - RABBITMQ_ENABLED_PLUGINS_FILE=/etc/rabbitmq/enabled_plugins
      - RABBITMQ_LOAD_DEFINITIONS=/etc/rabbitmq/definitions.json
    volumes:
      - ./conf/mc-observability/rabbitmq:/etc/rabbitmq
      - ./container-volume/mc-observability/rabbitmq/data:/var/lib/rabbitmq
    healthcheck:
      start_period: 120s
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 10s
      retries: 30

  mc-observability-maria:
    image: mariadb:10.11.11
    container_name: mc-observability-maria
    restart: on-failure
    networks:
      - mc-observability-network
    ports:
      - target: 3306
        published: ${MC_OBSERVABILITY_MARIA_PORT}
        protocol: tcp
    environment:
      - TZ="Asia/Seoul"
      - ALLOW_EMPTY_PASSWORD=no
      - MARIADB_ROOT_PASSWORD=${MC_OBSERVABILITY_MARIADB_ROOT_PASSWORD:-qwe1212!Q}
      - MARIADB_USER=${MC_OBSERVABILITY_MARIADB_USER:-mc-agent}
      - MARIADB_DATABASE=${MC_OBSERVABILITY_MARIADB_DATABASE:-mc_observability}
      - MARIADB_PASSWORD=${MC_OBSERVABILITY_MARIADB_PASSWORD:-mc-agent}
    volumes:
      - ./conf/mc-observability/mariadb/maria_init.sql:/docker-entrypoint-initdb.d/maria_init.sql
      - ./conf/mc-observability/mariadb/99-max-connections.cnf:/etc/mysql/mariadb.conf.d/99-max-connections.cnf
      - ./container-volume/mc-observability/maria/mysql/conf.d:/etc/mysql/conf.d:ro
      - ./container-volume/mc-observability/maria/mysql:/var/lib/mysql
      - ./container-volume/mc-observability/maria/log:/var/log/maria
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect"]
      <<: *default-health-check

  mc-observability-influx-init-volumes:
    image: busybox:stable
    container_name: mc-observability-influx-init-volumes
    restart: "no"
    networks:
      - mc-observability-network
    command: ["sh", "-c", "chown -R 1500:1500 /var/lib/influxdb"]
    volumes:
      - ./container-volume/mc-observability/influxdb/influxdb_data:/var/lib/influxdb
    user: root
    init: true

  mc-observability-influx:
    image: cloudbaristaorg/mc-observability-influx:edge
    container_name: mc-observability-influx
    restart: on-failure
    networks:
      - mc-observability-network
    ports:
      - target: 8086
        published: ${MC_OBSERVABILITY_INFLUX_PORT}
        protocol: tcp
    depends_on:
      mc-observability-influx-init-volumes:
        condition: service_completed_successfully
    environment:
      - INFLUXDB_HTTP_AUTH_ENABLED=${MC_OBSERVABILITY_INFLUXDB_HTTP_AUTH_ENABLED:-true}
      - INFLUXDB_ADMIN_USER=${MC_OBSERVABILITY_INFLUXDB_ADMIN_USER:-mc-agent}
      - INFLUXDB_ADMIN_PASSWORD=${MC_OBSERVABILITY_INFLUXDB_ADMIN_PASSWORD:-mc-agent}
      - INFLUXDB_DB=${MC_OBSERVABILITY_INFLUXDB_DB:-mc-observability}
    volumes:
      - ./conf/mc-observability/influxdb/influxdb_init:/docker-entrypoint-initdb.d
      - ./container-volume/mc-observability/influxdb/influxdb_data:/var/lib/influxdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      <<: *default-health-check

  mc-observability-influx-2-init-volumes:
    image: busybox:stable
    container_name: mc-observability-influx-2-init-volumes
    restart: "no"
    command: ["sh", "-c", "chown -R 1500:1500 /var/lib/influxdb"]
    volumes:
      - ./container-volume/mc-observability/influxdb/influxdb2_data:/var/lib/influxdb
    user: root
    init: true
    networks:
      - mc-observability-network

  mc-observability-influx-2:
    image: cloudbaristaorg/mc-observability-influx:edge
    container_name: mc-observability-influx-2
    restart: on-failure
    networks:
      - mc-observability-network
    ports:
      - target: 8086
        published: ${MC_OBSERVABILITY_INFLUX_2_PORT}
        protocol: tcp
    depends_on:
      mc-observability-influx-2-init-volumes:
        condition: service_completed_successfully
    environment:
      - INFLUXDB_HTTP_AUTH_ENABLED=${MC_OBSERVABILITY_INFLUXDB_HTTP_AUTH_ENABLED:-true}
      - INFLUXDB_ADMIN_USER=${MC_OBSERVABILITY_INFLUXDB_ADMIN_USER:-mc-agent}
      - INFLUXDB_ADMIN_PASSWORD=${MC_OBSERVABILITY_INFLUXDB_ADMIN_PASSWORD:-mc-agent}
      - INFLUXDB_DB=${MC_OBSERVABILITY_INFLUXDB_DB:-mc-observability}
    volumes:
      - ./conf/mc-observability/influxdb/influxdb_init:/docker-entrypoint-initdb.d
      - ./container-volume/mc-observability/influxdb/influxdb2_data:/var/lib/influxdb
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/health"]
      <<: *default-health-check

